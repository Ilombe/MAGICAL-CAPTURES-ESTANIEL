<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Capturas Mágicas Estaniel</title>

    <!-- PWA Meta Tags -->
    <meta name="description" content="Captura y edita fotogramas mágicos con IA Gemini" />
    <meta name="theme-color" content="#f00fb0" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CapturasMágicas" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
      body {
        font-family: 'Orbitron', sans-serif;
        background-color: #0c0217;
        overflow: hidden;
      }
      .aurora-background {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        overflow: hidden;
        z-index: -1;
      }
      .aurora-layer {
        position: absolute;
        width: 200%;
        height: 200%;
        opacity: 0.3;
        mix-blend-mode: screen;
        animation: rotate 30s linear infinite;
      }
      .aurora-layer:nth-child(1) {
        background: radial-gradient(circle at 25% 25%, #f00fb0, transparent 40%);
        animation-duration: 25s;
        animation-direction: reverse;
      }
      .aurora-layer:nth-child(2) {
        background: radial-gradient(circle at 75% 25%, #a046f0, transparent 40%);
        animation-duration: 20s;
      }
      .aurora-layer:nth-child(3) {
        background: radial-gradient(circle at 25% 75%, #00f0ff, transparent 40%);
        animation-duration: 35s;
      }
      .aurora-layer:nth-child(4) {
        background: radial-gradient(circle at 75% 75%, #f00fb0, transparent 40%);
        animation-duration: 28s;
        animation-direction: reverse;
      }
      @keyframes rotate {
        0% { transform: translate(-50%, -50%) rotate(0deg); }
        100% { transform: translate(-50%, -50%) rotate(360deg); }
      }
      .animated-title {
        font-weight: 900;
        background: linear-gradient(90deg, #e8c9ff, #fff, #f4c2ff, #c3d1ff, #e8c9ff);
        background-size: 400% 100%;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: shimmer 5s linear infinite;
        filter: drop-shadow(0 0 10px rgba(232, 201, 255, 0.7));
      }
      @keyframes shimmer {
        0% { background-position: 0% 50%; }
        100% { background-position: 135% 50%; }
      }
      .upload-ring {
        animation: spin 10s linear infinite;
      }
      .video-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 20px;
        height: 20px;
        background: #fff;
        border-radius: 50%;
        cursor: pointer;
        box-shadow: 0 0 10px #f00fb0, 0 0 5px #f00fb0;
        margin-top: -6px;
      }
      .video-slider::-moz-range-thumb {
        width: 20px;
        height: 20px;
        background: #fff;
        border-radius: 50%;
        cursor: pointer;
        box-shadow: 0 0 10px #f00fb0, 0 0 5px #f00fb0;
      }
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track { background: rgba(255,255,255,0.1); border-radius: 10px; }
      ::-webkit-scrollbar-thumb { background: #f00fb0; border-radius: 10px; box-shadow: 0 0 8px #f00fb0; }
      ::-webkit-scrollbar-thumb:hover { background: #ff33c4; }
      .gallery-container { position: relative; overflow: hidden; }
      .gallery-container .aurora-background { position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 0; opacity: 0.4; }
      .gallery-item {
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        animation: galleryItemEnter 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      }
      @keyframes galleryItemEnter {
        from { opacity: 0; transform: scale(0.7) translateY(20px); }
        to { opacity: 1; transform: scale(1) translateY(0); }
      }
      .aurora-button-container {
        position: relative;
        overflow: hidden;
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .aurora-button-container::before {
        content: '';
        position: absolute;
        top: 0; left: 0;
        width: 200%; height: 200%;
        background: radial-gradient(circle at center, rgba(240,15,176,0.6), transparent 50%),
                    radial-gradient(circle at top left, rgba(0,240,255,0.5), transparent 60%),
                    radial-gradient(circle at bottom right, rgba(160,70,240,0.5), transparent 70%);
        z-index: 0;
        opacity: 0;
        transform: translate(-25%, -25%);
        transition: opacity 0.4s ease-in-out;
        animation: aurora-spin 10s linear infinite;
      }
      @keyframes aurora-spin {
        from { transform: translate(-25%, -25%) rotate(0deg); }
        to { transform: translate(-25%, -25%) rotate(360deg); }
      }
      .action-button:hover:not(:disabled) .aurora-button-container { transform: translateY(-4px); box-shadow: 0 8px 25px rgba(240,15,176,0.3); }
      .action-button:hover:not(:disabled) .aurora-button-container::before { opacity: 1; }
      .action-button:active:not(:disabled) .aurora-button-container { transform: translateY(-2px) scale(0.95); transition-duration: 0.1s; }
      .aurora-button-container > * { position: relative; z-index: 1; }
      .input-pulse { transition: border-color 0.3s ease, box-shadow 0.3s ease; }
      .input-pulse:focus { outline: none; animation: pulse-glow 1.5s infinite alternate; }
      @keyframes pulse-glow {
        from { border-color: #f00fb0; box-shadow: 0 0 5px rgba(240,15,176,0.6), 0 0 10px rgba(240,15,176,0.4), inset 0 0 3px rgba(240,15,176,0.3); }
        to { border-color: #ff80d9; box-shadow: 0 0 12px rgba(240,15,176,0.9), 0 0 20px rgba(240,15,176,0.6), inset 0 0 5px rgba(240,15,176,0.5); }
      }
    </style>
    <link rel="stylesheet" href="/index.css">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
    <!-- Register Service Worker for PWA -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('SW registrado:', reg.scope))
            .catch(err => console.log('SW error:', err));
        });
      }
    </script>
  </body>
</html>
